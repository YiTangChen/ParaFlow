# GPU streamline-LIC config (ParaFlow_lic_gpu). Same as conf/lic_streamline.yaml
# but tuned for the GPU driver: streamlines are integrated on the GPU, then
# folded into the LIC image on the CPU. Output is a single PNG (same as the CPU
# driver) -- no .bin trajectories are written.
#
# Rank/GPU mapping: the tracer always uses CUDA device 0, so each MPI rank needs
# its OWN GPU -- launch one rank per GPU with per-task GPU isolation (srun
# --gpus-per-task=1 / --gpu-bind), which makes each rank see its assigned GPU as
# device 0. This allocation is 2 nodes x 4 GPUs = 8 GPUs, so nproc=8 (one rank per
# GPU) and nblocks=8 (one block per rank). To change N, regenerate the partition:
#     gpmetis conf/graph.info N        # -> conf/graph.info.part.N
# then set nproc=nblocks=N and graph_partition_indices below to match.
#
# Launch inside the salloc (or via jobs/osc_lic_batch_gpu.sh for multiple datasets):
#   srun -n 8 --ntasks-per-node=4 --gpus-per-task=1 --mpi=pmi2 ./ParaFlow_lic_gpu conf/lic_streamline_gpu.yaml

enable_timing: false
outputDir: lic_output_gpu         # lic.png lands here

maxsteps: 25000                    # RK4 steps per streamline, per direction (fwd + back)
record_interval: 50               # 2500/50 = ~50 stored points per streamline per direction
dt: 60                         # fixed step (s)

# Streamlines are generated by the SAME method as ./ParaFlow_streamline
# (ParaFlow::GenStreamLines: DIY iexchange + GPU RK4 + cross-block handoff).
useGPU: true                      # REQUIRED: without this GenStreamLines traces on the CPU
lic_direction: both               # forward | backward | both (both = LIC line runs through the seed)
lic_width: 512                   # 2:1 world-map aspect for the 1024x1024 seed grid
lic_height: 256                  # override the seed-grid auto-size
nproc: 8                          # MPI ranks == GPUs (4 per node x 2 nodes); one rank per GPU
nblocks: 8                        # one block per rank; must match graph.info.highres.part.8

# --- LIC folding strategy (A/B comparison) ---
# false = fold each rank's per-block SEGMENTS locally, then reduce the images
# true  = rank 0 reads the <gid>.bin files, reassembles WHOLE streamlines
#         (scripts/plot/read_traces.py logic), and folds those.
#         NOTE: <gid>.bin keeps only the LAST direction, so for combine use
#         lic_direction: forward (or backward), not both.
lic_combine: false

# --- Where the streamlines live: memory or storage ---------------------------
#   memory = traces are traced straight into RAM and folded from there (one
#            direction at a time, freed immediately after folding). No <gid>.bin
#            file is ever written to disk (GenStreamLines is called with
#            writeToDisk=false). The only artifact left is lic.png.
#   disk   = the <gid>.bin files are written and KEPT (moved into the run folder
#            <outputDir>/<mode>_<dir>_<data>/) so the raw trajectories can be
#            reused later (scripts/plot/read_traces.py, plotting, ...).
#
# Only applies to lic_combine: false (METHOD 2) -- combine mode always needs the
# on-disk files to reassemble whole streamlines, so it always writes regardless.
#
# Supersedes the old boolean `keep_streamline_bin` (still honored if this is absent).
streamline_storage: memory        # memory | disk

# Pre-filter tagging: 1st run inBlock-filters and writes each block's seeds to
# <seedFile>.licblock<gid>_of<nblocks>.bin; later runs read those and SKIP the
# slow 1M-seed scan. Delete those .bin files if you change the seeds/partition.
seed_cache: true

meshfile_src: /fs/scratch/PAS0027/Jiaxin/mpas-o-rendering/high-res/20210421_sim7_CORE_18to6v3.mpaso.rst.0015-01-01_00000.nc                     # geometry
datafile_src: /fs/scratch/PAS0027/Jiaxin/mpas-o-rendering/high-res/20210421_sim7_CORE_18to6v3.mpaso.hist.am.timeSeriesStatsMonthly.0015-01-01.nc # velocity
graph_partition_indices: /fs/scratch/PAS0027/suwencao/ParaFlowClean/conf/graph.info.highres.part.8
isBinarySeed: true
seedFile: /fs/scratch/PAS0027/suwencao/ParaFlowClean/seed/seed_points_256x256_uv_xyz.bin

# time-varying variables (streamlines use a single steady snapshot)
isTimeVarying: false
velocity:
  cartesian:      # XYZ
    X: null
    Y: null
    Z: null
  spherical:      # zonal & meridional
    zonal: null
    meridional: null
  normal: timeMonthly_avg_normalVelocity   # MPAS-O edge-normal velocity
zTop: null
layerThickness: timeMonthly_avg_layerThickness
vertVelocityTop: timeMonthly_avg_vertVelocityTop
xtime: xtime_startMonthly
